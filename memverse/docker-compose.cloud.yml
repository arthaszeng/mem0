services:
  memverse_store:
    image: qdrant/qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - memverse_storage:/qdrant/storage
    restart: unless-stopped

  memverse-mcp:
    image: memverse/memverse-mcp:${APP_VERSION:-latest}
    environment:
      - MEMVERSE_USER=${MEMVERSE_USER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - API_KEY=${API_KEY:-}
      - CATEGORIZATION_PROVIDER=${CATEGORIZATION_PROVIDER:-openai}
      - CATEGORIZATION_MODEL=${CATEGORIZATION_MODEL:-}
      - FORCE_OPENAI=${FORCE_OPENAI:-}
      - APP_VERSION=${APP_VERSION:-latest}
    depends_on:
      - memverse_store
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - memverse_data:/data
    restart: unless-stopped

  memverse-ui:
    image: memverse/memverse-ui:${APP_VERSION:-latest}
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - memverse-mcp
    restart: unless-stopped

  lobe-chat:
    image: lobehub/lobe-chat:latest
    ports:
      - "127.0.0.1:3210:3210"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_PROXY_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - ACCESS_CODE=${LOBE_ACCESS_CODE:-arthas2026}
      - NEXT_PUBLIC_BASE_PATH=/chat
      - PORT=3210
    depends_on:
      - memverse-mcp
    restart: unless-stopped

  langgraph-agent:
    image: memverse/langgraph-agent:${APP_VERSION:-latest}
    ports:
      - "127.0.0.1:8766:8766"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
    depends_on:
      - memverse-mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  memverse_storage:
  memverse_data:
