<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memverse — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">
    <div class="w-full max-w-sm bg-gray-900 rounded-2xl shadow-xl p-8">
        <h1 class="text-2xl font-bold text-white text-center mb-2">Memverse</h1>
        <p class="text-gray-400 text-center text-sm mb-6">
            {% if client_name %}Authorize <span class="text-purple-400 font-medium">{{ client_name }}</span>{% else %}Sign in to continue{% endif %}
        </p>

        {% if error %}
        <div class="bg-red-900/40 border border-red-700 text-red-300 text-sm rounded-lg px-4 py-2 mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/auth/authorize" class="space-y-4">
            <input type="hidden" name="client_id" value="{{ client_id }}">
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
            <input type="hidden" name="state" value="{{ state }}">
            <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
            <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">
            <input type="hidden" name="scope" value="{{ scope }}">

            <div>
                <label class="block text-gray-300 text-sm font-medium mb-1" for="username">Username</label>
                <input id="username" name="username" type="text" required autofocus
                    class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="Enter username">
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-medium mb-1" for="password">Password</label>
                <input id="password" name="password" type="password" required
                    class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="Enter password">
            </div>

            <button type="submit"
                class="w-full py-2.5 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg transition-colors">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
