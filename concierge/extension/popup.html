<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --accent: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .header .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: #1e293b;
    color: var(--muted);
    font-weight: 500;
  }
  .status-card {
    background: var(--card);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }
  .status-row:not(:last-child) {
    border-bottom: 1px solid #252830;
  }
  .status-label {
    font-size: 13px;
    color: var(--muted);
  }
  .status-value {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.ok { background: var(--green); }
  .dot.warn { background: var(--yellow); }
  .dot.error { background: var(--red); }
  .dot.checking {
    background: var(--muted);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .result {
    background: var(--card);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }
  .result.show { display: block; }
  .result.success { border-left: 3px solid var(--green); }
  .result.fail { border-left: 3px solid var(--red); }
  .result strong { display: block; margin-bottom: 4px; }
  .result .detail { color: var(--muted); }
  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s ease;
  }
  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid #334155;
    margin-top: 8px;
    font-size: 13px;
    font-weight: 500;
  }
  .btn-secondary:hover:not(:disabled) {
    background: #1e293b;
  }
  .footer {
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Concierge Bridge</h1>
    <span class="badge">MCP</span>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">MCP Server</span>
      <span class="status-value">
        <span class="dot checking" id="dotServer"></span>
        <span id="txtServer">Checking…</span>
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Concierge Login</span>
      <span class="status-value">
        <span class="dot checking" id="dotLogin"></span>
        <span id="txtLogin">Checking…</span>
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Cookie Sync</span>
      <span class="status-value">
        <span class="dot checking" id="dotSync"></span>
        <span id="txtSync">Checking…</span>
      </span>
    </div>
  </div>

  <div class="result" id="result">
    <strong id="resultTitle"></strong>
    <span class="detail" id="resultDetail"></span>
  </div>

  <button id="syncBtn" class="btn-primary" disabled>Sync Session</button>

  <div class="footer" id="footer"></div>

  <script src="popup.js"></script>
</body>
</html>
