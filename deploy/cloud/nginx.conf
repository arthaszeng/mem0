events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=agent_limit:10m rate=2r/s;

    # ===== Main HTTPS server =====
    server {
        listen 443 ssl;
        server_name arthaszeng.top www.arthaszeng.top 47.108.141.20;

        ssl_certificate /etc/nginx/cert/arthaszeng.top.pem;
        ssl_certificate_key /etc/nginx/cert/arthaszeng.top.key;

        # --- Auth Service (no gateway auth) ---
        location /auth/ {
            proxy_pass http://127.0.0.1:8760;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- OAuth Protected Resource Metadata (no auth) ---
        location ~ ^/(memory-mcp|concierge-mcp)/\.well-known/oauth-protected-resource$ {
            proxy_pass http://127.0.0.1:8760;
            rewrite ^/(.*)/\.well-known/oauth-protected-resource$ /auth/resource-metadata/$1 break;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Internal auth verification subrequest ---
        location = /internal/auth/verify {
            internal;
            proxy_pass http://127.0.0.1:8760/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # --- OpenMemory UI (no gateway auth — UI handles login) ---
        location /memory {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Protected: Backup (long-running import/export) ---
        location /api/v1/backup/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            client_max_body_size 100m;
        }

        # --- Protected: OpenMemory REST API ---
        location /api/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Protected: OpenMemory MCP SSE ---
        location /memory-mcp/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # --- Concierge OAuth endpoints (no gateway auth — public protocol) ---
        location /concierge-mcp/.well-known/ {
            proxy_pass http://127.0.0.1:8767;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
        location ~ ^/concierge-mcp/auth/(register|authorize|token|extension-id)$ {
            proxy_pass http://127.0.0.1:8767;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Protected: Concierge MCP (SSE, status, cookies) ---
        location /concierge-mcp/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_pass http://127.0.0.1:8767;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # --- Lobe Chat redirect ---
        location /chat {
            return 302 https://arthaszeng.top:3211/;
        }

        # --- LangGraph Agent ---
        location /agent/ {
            limit_req zone=agent_limit burst=5 nodelay;
            proxy_pass http://127.0.0.1:8766;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # --- Root ---
        location / {
            return 200 "arthaszeng.top - coming soon";
            add_header Content-Type text/plain;
        }
    }

    # ===== Lobe Chat HTTPS (standalone port) =====
    server {
        listen 3211 ssl;
        server_name arthaszeng.top www.arthaszeng.top 47.108.141.20;

        ssl_certificate /etc/nginx/cert/arthaszeng.top.pem;
        ssl_certificate_key /etc/nginx/cert/arthaszeng.top.key;

        location / {
            proxy_pass http://127.0.0.1:3210;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
