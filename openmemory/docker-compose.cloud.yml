services:
  mem0_store:
    image: qdrant/qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - mem0_storage:/mem0/storage
    restart: unless-stopped

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build:
      context: api/
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
    env_file:
      - api/.env
    depends_on:
      - mem0_store
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - openmemory_data:/data
    restart: unless-stopped

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
    image: mem0/openmemory-ui:latest
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8765}
      - NEXT_PUBLIC_USER_ID=${MEM0_USER}
    depends_on:
      - openmemory-mcp
    restart: unless-stopped

  lobe-chat:
    image: lobehub/lobe-chat:latest
    ports:
      - "127.0.0.1:3210:3210"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_PROXY_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - ACCESS_CODE=${LOBE_ACCESS_CODE:-arthas2026}
      - PORT=3210
    depends_on:
      - openmemory-mcp
    restart: unless-stopped

volumes:
  mem0_storage:
  openmemory_data:
