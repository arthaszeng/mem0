services:
  mem0_store:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - mem0_storage:/mem0/storage

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - MEM0_USER=${MEM0_USER}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy-key}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - API_KEY=${API_KEY:-}
      - CATEGORIZATION_PROVIDER=${CATEGORIZATION_PROVIDER:-ollama}
      - CATEGORIZATION_MODEL=${CATEGORIZATION_MODEL:-}
      - FORCE_OPENAI=${FORCE_OPENAI:-}
    depends_on:
      - mem0_store
    ports:
      - "8765:8765"
    volumes:
      - ./api:/usr/src/openmemory
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload"

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - openmemory-mcp

volumes:
  mem0_storage:
