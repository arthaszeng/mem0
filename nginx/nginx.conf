events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=agent_limit:10m rate=2r/s;

    # HTTP server (with MCP exceptions for Cursor)
    server {
        listen 80;
        server_name arthaszeng.top www.arthaszeng.top 47.108.141.20;

        # OpenMemory MCP SSE (HTTP direct for Cursor — bypasses local proxy TLS issues)
        location /memory-mcp/ {
            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Concierge MCP SSE (HTTP direct for Cursor)
        location /concierge-mcp/ {
            proxy_pass http://127.0.0.1:8767;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # OpenMemory REST API (for Cloudflare Tunnel → ChatGPT Actions)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        location / {
            return 301 https://arthaszeng.top$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        server_name arthaszeng.top www.arthaszeng.top 47.108.141.20;

        ssl_certificate /etc/nginx/cert/arthaszeng.top.pem;
        ssl_certificate_key /etc/nginx/cert/arthaszeng.top.key;

        # OpenMemory UI: /memory -> port 3001
        location /memory {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # OpenMemory API: /api -> port 8765
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-API-Key hN_A-orPnb9AtCu2S_UJNv4JZ9Mx3Rd9mpZom0fn-Xc;
        }

        # OpenMemory MCP SSE: /memory-mcp/ -> port 8765 (path preserved)
        location /memory-mcp/ {
            proxy_pass http://127.0.0.1:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Concierge MCP SSE: /concierge-mcp/ -> port 8767 (path preserved)
        location /concierge-mcp/ {
            proxy_pass http://127.0.0.1:8767;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Lobe Chat: /chat -> redirect to port 3211
        location /chat {
            return 302 https://arthaszeng.top:3211/;
        }

        # LangGraph Agent: /agent -> port 8766
        location /agent/ {
            limit_req zone=agent_limit burst=5 nodelay;
            proxy_pass http://127.0.0.1:8766;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # Root
        location / {
            return 200 "arthaszeng.top - coming soon";
            add_header Content-Type text/plain;
        }
    }

    # Lobe Chat HTTPS (standalone port)
    server {
        listen 3211 ssl;
        server_name arthaszeng.top www.arthaszeng.top 47.108.141.20;

        ssl_certificate /etc/nginx/cert/arthaszeng.top.pem;
        ssl_certificate_key /etc/nginx/cert/arthaszeng.top.key;

        location / {
            proxy_pass http://127.0.0.1:3210;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
