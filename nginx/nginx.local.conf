events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=agent_limit:10m rate=2r/s;

    server {
        listen 80;
        server_name localhost;

        # ===== Auth Service routes -- NO auth required =====
        location /auth/ {
            proxy_pass http://auth-service:8760;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        # ===== OAuth Protected Resource Metadata -- NO auth required =====
        location ~ ^/(memory-mcp|concierge-mcp)/\.well-known/oauth-protected-resource$ {
            proxy_pass http://auth-service:8760;
            rewrite ^/(.*)/\.well-known/oauth-protected-resource$ /auth/resource-metadata/$1 break;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        # ===== Internal auth verification subrequest =====
        location = /internal/auth/verify {
            internal;
            proxy_pass http://auth-service:8760/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # ===== Protected: OpenMemory MCP SSE =====
        location /memory-mcp/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            proxy_pass http://openmemory-mcp:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ===== Protected: Concierge MCP SSE =====
        location /concierge-mcp/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            proxy_pass http://concierge-mcp:8767;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ===== Protected: Backup (long-running import/export) =====
        location /api/v1/backup/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            proxy_pass http://openmemory-mcp:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            client_max_body_size 100m;
        }

        # ===== Protected: OpenMemory REST API =====
        location /api/ {
            auth_request /internal/auth/verify;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            auth_request_set $auth_is_superadmin $upstream_http_x_auth_is_superadmin;

            proxy_set_header X-Auth-User-Id $auth_user_id;
            proxy_set_header X-Auth-Username $auth_username;
            proxy_set_header X-Auth-Is-Superadmin $auth_is_superadmin;
            proxy_set_header Authorization "";

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://openmemory-mcp:8765;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        # ===== OpenMemory UI (no auth at gateway level -- UI handles its own login) =====
        location /memory {
            proxy_pass http://openmemory-ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        # ===== Root =====
        location / {
            return 200 "local dev gateway - ok";
            add_header Content-Type text/plain;
        }
    }
}
