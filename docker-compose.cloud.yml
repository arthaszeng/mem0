services:
  # ===== Vector Store =====
  memverse-store:
    image: qdrant/qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - memverse_storage:/qdrant/storage
    restart: unless-stopped

  # ===== Auth Service =====
  auth-service:
    image: memverse/auth-service:${APP_VERSION}
    env_file: .env.cloud
    ports:
      - "127.0.0.1:8760:8760"
    volumes:
      - auth_data:/data
    restart: unless-stopped

  # ===== Memverse API + MCP =====
  memverse-mcp:
    image: memverse/memverse-mcp:${APP_VERSION}
    env_file: .env.cloud
    depends_on:
      - memverse-store
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - memverse_data:/data
    restart: unless-stopped

  # ===== Memverse UI =====
  memverse-ui:
    image: memverse/memverse-ui:${APP_VERSION}
    env_file: .env.cloud
    depends_on:
      - memverse-mcp
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  # ===== Concierge MCP =====
  concierge-mcp:
    image: memverse/concierge-mcp:${APP_VERSION}
    env_file: .env.cloud
    ports:
      - "127.0.0.1:8767:8767"
    restart: unless-stopped

  # ===== Lobe Chat =====
  lobe-chat:
    image: lobehub/lobe-chat:latest
    ports:
      - "127.0.0.1:3210:3210"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_PROXY_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - ACCESS_CODE=${LOBE_ACCESS_CODE:-arthas2026}
      - NEXT_PUBLIC_BASE_PATH=/chat
      - PORT=3210
    depends_on:
      - memverse-mcp
    restart: unless-stopped

  # ===== LangGraph Agent =====
  langgraph-agent:
    image: memverse/langgraph-agent:${APP_VERSION}
    ports:
      - "127.0.0.1:8766:8766"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
    depends_on:
      - memverse-mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  auth_data:
  memverse_storage:
    external: true
    name: openmemory_mem0_storage
  memverse_data:
    external: true
    name: openmemory_openmemory_data
