services:
  # ===== Vector Store =====
  mem0-store:
    image: qdrant/qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - mem0_storage:/qdrant/storage
    restart: unless-stopped

  # ===== Auth Service =====
  auth-service:
    image: mem0/auth-service:latest
    env_file: .env.cloud
    ports:
      - "127.0.0.1:8760:8760"
    volumes:
      - auth_data:/data
    restart: unless-stopped

  # ===== OpenMemory API + MCP =====
  openmemory-mcp:
    image: mem0/openmemory-mcp:latest
    env_file: .env.cloud
    depends_on:
      - mem0-store
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - openmemory_data:/data
    restart: unless-stopped

  # ===== OpenMemory UI =====
  openmemory-ui:
    image: mem0/openmemory-ui:latest
    env_file: .env.cloud
    depends_on:
      - openmemory-mcp
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  # ===== Concierge MCP =====
  concierge-mcp:
    image: mem0/concierge-mcp:latest
    env_file: .env.cloud
    ports:
      - "127.0.0.1:8767:8767"
    restart: unless-stopped

  # ===== Lobe Chat =====
  lobe-chat:
    image: lobehub/lobe-chat:latest
    ports:
      - "127.0.0.1:3210:3210"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_PROXY_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - ACCESS_CODE=${LOBE_ACCESS_CODE:-arthas2026}
      - NEXT_PUBLIC_BASE_PATH=/chat
      - PORT=3210
    depends_on:
      - openmemory-mcp
    restart: unless-stopped

  # ===== LangGraph Agent =====
  langgraph-agent:
    image: mem0/langgraph-agent:latest
    ports:
      - "127.0.0.1:8766:8766"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://millionengine.com/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
    depends_on:
      - openmemory-mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  auth_data:
  mem0_storage:
    external: true
    name: openmemory_mem0_storage
  openmemory_data:
    external: true
    name: openmemory_openmemory_data
