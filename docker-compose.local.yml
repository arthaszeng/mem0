services:
  # ===== Gateway =====
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - memverse-mcp
      - memverse-ui
    restart: unless-stopped

  # ===== Auth Service (OAuth 2.1 Authorization Server) =====
  auth-service:
    build:
      context: memverse/auth/
      args:
        APP_VERSION: ${APP_VERSION}
    image: memverse/auth-service:${APP_VERSION}
    env_file: .env.local
    volumes:
      - ./memverse/auth:/app
      - auth_data:/data
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8760 --reload"
    restart: unless-stopped

  # ===== Vector Store =====
  memverse-store:
    image: qdrant/qdrant
    volumes:
      - memverse_storage:/qdrant/storage
    restart: unless-stopped

  # ===== Memverse API + MCP =====
  memverse-mcp:
    build:
      context: memverse/api/
      args:
        APP_VERSION: ${APP_VERSION}
    image: memverse/memverse-mcp:${APP_VERSION}
    env_file: .env.local
    depends_on:
      - memverse-store
    volumes:
      - ./memverse/api:/usr/src/memverse
      - memverse_data:/data
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload"
    restart: unless-stopped

  # ===== Memverse UI =====
  memverse-ui:
    build:
      context: memverse/ui/
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION}
    image: memverse/memverse-ui:${APP_VERSION}
    env_file: .env.local
    depends_on:
      - memverse-mcp
    restart: unless-stopped

  # ===== Concierge MCP =====
  concierge-mcp:
    build:
      context: concierge/
      args:
        APP_VERSION: ${APP_VERSION}
    image: memverse/concierge-mcp:${APP_VERSION}
    env_file: .env.local
    restart: unless-stopped

volumes:
  auth_data:
  memverse_storage:
  memverse_data:
